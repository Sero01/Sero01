name: Update profile card

on:
  schedule:
    - cron: "17 2 * * *" # daily — refreshes uptime and GitHub stats
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate profile.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_profile.py

      - name: Commit if changed
        run: |
          if ! git diff --quiet profile.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile.svg
            git commit -m "chore: refresh uptime and stats"
            git push
          fi
